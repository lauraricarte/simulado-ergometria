<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado de Ergometria 2024 — SBC/DERC</title>
<style>
  :root{
    --ink:#16181d;
    --paper:#f6f4ef;
    --card:#fffdf9;
    --line:#e3ddd1;
    --muted:#6d6b63;
    --pulse:#c4382f;       /* vermelho cardio */
    --pulse-deep:#8f231c;
    --good:#1f7a52;
    --good-bg:#e7f4ec;
    --bad:#b5362c;
    --bad-bg:#fbe9e6;
    --accent:#0d4f63;      /* azul ECG */
    --gold:#b9892f;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:"Iowan Old Style","Palatino Linotype",Georgia,serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.55;
    min-height:100vh;
    padding:env(safe-area-inset-top) 0 0;
  }
  .mono{font-family:"SFMono-Regular",ui-monospace,"Cascadia Mono",Menlo,Consolas,monospace}
  .wrap{max-width:680px;margin:0 auto;padding:18px 18px 60px}

  /* ---------- header ---------- */
  header{
    display:flex;align-items:center;justify-content:space-between;
    gap:12px;padding:6px 2px 14px;border-bottom:2px solid var(--ink);
  }
  .brand{display:flex;align-items:center;gap:10px}
  .ecg{width:42px;height:26px;flex:none}
  .ecg path{fill:none;stroke:var(--pulse);stroke-width:2.4;
    stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:120;stroke-dashoffset:120;
    animation:trace 2.2s ease-in-out forwards}
  @keyframes trace{to{stroke-dashoffset:0}}
  .brand h1{font-size:1.02rem;font-weight:700;letter-spacing:.2px;line-height:1.15}
  .brand small{display:block;font-size:.68rem;color:var(--muted);
    letter-spacing:.14em;text-transform:uppercase;font-family:inherit;margin-top:2px}
  .reset{
    font-family:inherit;font-size:.72rem;color:var(--muted);
    background:none;border:1px solid var(--line);border-radius:20px;
    padding:5px 11px;cursor:pointer;white-space:nowrap;letter-spacing:.04em
  }
  .reset:hover{color:var(--pulse);border-color:var(--pulse)}

  /* ---------- progress ---------- */
  .pbar-row{display:flex;align-items:center;gap:12px;margin:16px 2px 6px}
  .pbar{flex:1;height:7px;background:#e7e1d5;border-radius:99px;overflow:hidden}
  .pfill{height:100%;width:0;background:linear-gradient(90deg,var(--pulse),var(--gold));
    border-radius:99px;transition:width .4s cubic-bezier(.3,.8,.3,1)}
  .pcount{font-size:.74rem;color:var(--muted);letter-spacing:.06em;white-space:nowrap}

  /* ---------- card ---------- */
  .card{
    background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius);padding:22px 20px 24px;margin-top:14px;
    box-shadow:0 1px 0 #fff inset, 0 10px 30px -22px rgba(0,0,0,.4);
    animation:rise .35s ease both
  }
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  .qtop{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
  .qnum{font-family:"SFMono-Regular",ui-monospace,monospace;font-size:.72rem;
    color:#fff;background:var(--ink);padding:3px 8px;border-radius:6px;letter-spacing:.05em}
  .qtag{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;
    color:var(--accent);font-weight:700}
  .qtext{font-size:1.12rem;line-height:1.5;margin:10px 0 4px;font-weight:600}
  .qcase{font-size:1.0rem;color:#2b2d33;margin-bottom:14px;font-style:italic}

  /* ---------- options ---------- */
  .opts{display:flex;flex-direction:column;gap:9px;margin-top:6px}
  .opt{
    text-align:left;font-family:inherit;font-size:.98rem;color:var(--ink);
    background:#fff;border:1.5px solid var(--line);border-radius:11px;
    padding:13px 14px;cursor:pointer;display:flex;gap:11px;align-items:flex-start;
    transition:border-color .15s, background .15s, transform .08s
  }
  .opt:hover:not(:disabled){border-color:var(--accent)}
  .opt:active:not(:disabled){transform:scale(.992)}
  .opt .key{font-family:"SFMono-Regular",ui-monospace,monospace;font-weight:700;
    color:var(--accent);flex:none;width:1.1em}
  .opt:disabled{cursor:default}
  .opt.correct{border-color:var(--good);background:var(--good-bg)}
  .opt.correct .key{color:var(--good)}
  .opt.wrong{border-color:var(--bad);background:var(--bad-bg)}
  .opt.wrong .key{color:var(--bad)}
  .opt .mark{margin-left:auto;font-weight:700;flex:none}
  .opt.correct .mark{color:var(--good)}
  .opt.wrong .mark{color:var(--bad)}

  /* open / self-assess (no options) */
  .reveal-btn{
    font-family:inherit;font-size:.95rem;font-weight:600;color:#fff;
    background:var(--accent);border:none;border-radius:11px;
    padding:13px 16px;cursor:pointer;width:100%;letter-spacing:.02em;
    transition:background .15s,transform .08s
  }
  .reveal-btn:hover{background:#0a3f50}
  .reveal-btn:active{transform:scale(.99)}
  .selfrow{display:flex;gap:9px;margin-top:12px}
  .selfrow button{flex:1;font-family:inherit;font-size:.9rem;font-weight:600;
    border-radius:10px;padding:11px;cursor:pointer;border:1.5px solid var(--line);background:#fff}
  .self-hit{color:var(--good);border-color:var(--good)}
  .self-hit:hover{background:var(--good-bg)}
  .self-miss{color:var(--bad);border-color:var(--bad)}
  .self-miss:hover{background:var(--bad-bg)}

  /* ---------- feedback ---------- */
  .fb{margin-top:18px;animation:rise .3s ease both}
  .verdict{display:flex;align-items:center;gap:9px;font-weight:700;
    font-size:1.02rem;margin-bottom:12px}
  .verdict.ok{color:var(--good)}
  .verdict.no{color:var(--bad)}
  .verdict .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .verdict.ok .dot{background:var(--good)}
  .verdict.no .dot{background:var(--bad)}

  .ans{background:#fbf8f1;border-left:3px solid var(--gold);
    padding:11px 14px;border-radius:0 9px 9px 0;margin-bottom:13px;font-size:.97rem}
  .ans b{color:var(--pulse-deep)}

  .block-label{font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);font-weight:700;margin:0 0 5px}
  .explain{font-size:.95rem;color:#33353b;margin-bottom:15px}
  .explain b{color:var(--ink)}

  .thm{display:flex;gap:11px;background:linear-gradient(180deg,#fff,#fdfbf6);
    border:1px solid var(--gold);border-radius:11px;padding:13px 14px}
  .thm .ico{flex:none;font-size:1.15rem;line-height:1.3}
  .thm .body{font-size:.93rem}
  .thm .body strong{display:block;font-size:.66rem;letter-spacing:.14em;
    text-transform:uppercase;color:var(--gold);margin-bottom:3px;font-weight:800}

  /* ---------- nav ---------- */
  .nav{display:flex;gap:10px;margin-top:20px}
  .nav button{flex:1;font-family:inherit;font-size:.95rem;font-weight:600;
    padding:13px;border-radius:11px;cursor:pointer;transition:transform .08s,opacity .15s}
  .nav button:active{transform:scale(.99)}
  .btn-prev{background:#fff;border:1.5px solid var(--line);color:var(--muted)}
  .btn-prev:hover{border-color:var(--ink);color:var(--ink)}
  .btn-next{background:var(--pulse);border:1.5px solid var(--pulse);color:#fff}
  .btn-next:hover{background:var(--pulse-deep);border-color:var(--pulse-deep)}
  .btn-next:disabled{opacity:.4;cursor:not-allowed}
  .btn-next:disabled:hover{background:var(--pulse);border-color:var(--pulse)}

  /* ---------- results ---------- */
  .result{text-align:center;padding:30px 22px 34px}
  .result .score-ring{margin:0 auto 18px;display:block}
  .result h2{font-size:1.5rem;margin-bottom:6px}
  .result .pct{font-family:"SFMono-Regular",ui-monospace,monospace;
    font-size:2.6rem;font-weight:700;line-height:1}
  .result .sub{color:var(--muted);font-size:.92rem;margin:8px 0 4px}
  .result .verdict-msg{font-size:1.05rem;margin:14px 0 22px;font-weight:600}
  .result-stats{display:flex;gap:10px;justify-content:center;margin-bottom:24px}
  .stat{flex:1;max-width:130px;background:#fff;border:1px solid var(--line);
    border-radius:11px;padding:13px 8px}
  .stat .n{font-family:"SFMono-Regular",ui-monospace,monospace;font-size:1.5rem;font-weight:700;display:block}
  .stat .l{font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:3px}
  .stat.hit .n{color:var(--good)}
  .stat.miss .n{color:var(--bad)}
  .result .actions{display:flex;flex-direction:column;gap:10px}
  .result .actions button{font-family:inherit;font-size:.96rem;font-weight:600;
    padding:13px;border-radius:11px;cursor:pointer}
  .again{background:var(--pulse);color:#fff;border:none}
  .again:hover{background:var(--pulse-deep)}
  .review{background:#fff;color:var(--accent);border:1.5px solid var(--accent)}
  .review:hover{background:#eef5f7}
  /* prioridade de estudo */
  .focus{text-align:left;margin:8px 0 20px;border:1px solid var(--gold);
    background:linear-gradient(180deg,#fffdf7,#fdf8ec);border-radius:12px;padding:15px 16px}
  .focus.all-good{border-color:var(--good);background:linear-gradient(180deg,#f6fbf8,#eaf5ee)}
  .focus-head{display:flex;align-items:center;gap:8px;font-weight:700;font-size:1rem;margin-bottom:5px}
  .focus-sub{font-size:.86rem;color:var(--muted);margin-bottom:10px;line-height:1.45}
  .focus-list{list-style:none;counter-reset:fl;display:flex;flex-direction:column;gap:7px}
  .focus-list li{counter-increment:fl;display:flex;align-items:center;gap:10px;
    font-size:.92rem;background:#fff;border:1px solid var(--line);border-radius:9px;padding:9px 12px}
  .focus-list li::before{content:counter(fl);font-family:"SFMono-Regular",ui-monospace,monospace;
    font-weight:700;color:#fff;background:var(--pulse);width:22px;height:22px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:.72rem;flex:none}
  .focus-list .fl-name{flex:1}
  .focus-list .fl-meta{font-weight:700;font-size:.82rem}

  /* desempenho por assunto */
  .diag{text-align:left;margin:4px 0 20px}
  .diag-row{margin-bottom:13px}
  .diag-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:5px}
  .diag-name{font-size:.88rem;font-weight:600}
  .diag-tag{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-weight:800;
    border:1px solid;border-radius:20px;padding:2px 8px;flex:none}
  .diag-bar{height:8px;background:#e7e1d5;border-radius:99px;overflow:hidden}
  .diag-fill{height:100%;border-radius:99px;transition:width .8s cubic-bezier(.3,.8,.3,1)}
  .diag-frac{display:block;font-size:.7rem;color:var(--muted);margin-top:4px;text-align:right}

  .missed-list{text-align:left;margin-top:22px;border-top:1px solid var(--line);padding-top:16px;display:none}
  .missed-list.show{display:block}
  .missed-list h3{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);margin-bottom:10px}
  .missed-item{font-size:.88rem;padding:9px 11px;background:#fff;border:1px solid var(--line);
    border-radius:9px;margin-bottom:7px;cursor:pointer;display:flex;gap:9px}
  .missed-item:hover{border-color:var(--pulse)}
  .missed-item .mn{font-family:"SFMono-Regular",ui-monospace,monospace;color:var(--pulse);font-weight:700;flex:none}

  footer{text-align:center;font-size:.7rem;color:var(--muted);margin-top:26px;line-height:1.5}

  @media (max-width:480px){
    .wrap{padding:14px 13px 50px}
    .qtext{font-size:1.06rem}
    .brand h1{font-size:.92rem}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
    .ecg path{stroke-dashoffset:0}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <svg class="ecg" viewBox="0 0 60 30" aria-hidden="true">
        <path d="M1 15 H14 L18 15 L21 6 L25 24 L29 15 L33 15 L36 10 L40 20 L44 15 H59"/>
      </svg>
      <div>
        <h1>Simulado de Ergometria</h1>
        <small>SBC / DERC · 2024</small>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <a href="index.html" class="reset" style="text-decoration:none;display:inline-flex;align-items:center">☰ menu</a>
      <button class="reset" id="resetBtn" title="Recomeçar do zero">recomeçar</button>
    </div>
  </header>

  <div id="quizArea">
    <div class="pbar-row">
      <div class="pbar"><div class="pfill" id="pfill"></div></div>
      <span class="pcount mono" id="pcount">01 / 60</span>
    </div>
    <div id="cardSlot"></div>
    <div class="nav">
      <button class="btn-prev" id="prevBtn">← Anterior</button>
      <button class="btn-next" id="nextBtn" disabled>Próxima →</button>
    </div>
  </div>

  <div id="resultArea"></div>

  <footer>
    Baseado na Diretriz Brasileira de Ergometria em População Adulta — 2024 (SBC/DERC).<br>
    Material de estudo. Conferir sempre a fonte primária.
  </footer>
</div>

<script>
/* ============ DADOS ============ */
/* type:"mc" = múltipla escolha (correct = índice); type:"open" = dissertativa/auto-avaliação */
const QUESTIONS = [
/* BLOCO 1 */
{block:"Contraindicações & segurança",type:"mc",
 q:"Homem de 58 anos chega para TE. Em repouso, PA = 184/96 mmHg (confirmada), assintomático. Conduta correta?",
 options:[
   "Iniciar o TE com monitorização rigorosa",
   "Não realizar o exame — PAS de repouso ≥180 mmHg é contraindicação absoluta",
   "Liberar e repetir a PA no pico do esforço",
   "Realizar, pois só PAD >110 mmHg contraindica"],
 correct:1,
 answer:"Não realizar — PAS persistente em repouso ≥180 mmHg (ou PAD >110) é contraindicação absoluta.",
 explain:"As <b>contraindicações absolutas (Quadro 1)</b> incluem: embolia/infarto pulmonar agudo; enfermidade aguda/febril/grave; incapacidade física/mental de se exercitar; intoxicação medicamentosa; distúrbios hidroeletrolíticos não corrigidos; BAV de risco; <b>PAS ≥180 ou PAD >110 em repouso</b>; crise/urgência hipertensiva; hipertireoidismo descontrolado; descolamento de retina recente; cardiopatia congênita cianótica descompensada; IAM <5 dias ou complicado; angina instável; arritmias não controladas; EAo grave sintomática; IC descompensada; miocardite/pericardite aguda; dissecção de aorta; aneurisma com indicação de intervenção; doença pulmonar descompensada; DM descompensado.",
 thm:"PAS de repouso ≥180 OU PAD >110 = absoluta. Não confunda com o limite de interrupção (250 / 120–140), que é bem mais alto."},

{block:"Contraindicações & segurança",type:"mc",
 q:"Qual destas é uma contraindicação RELATIVA (não absoluta) ao TE?",
 options:[
   "Angina instável",
   "Estenose aórtica grave sintomática",
   "BAV de 2º grau Mobitz I assintomático",
   "Dissecção aguda de aorta"],
 correct:2,
 answer:"BAV de 2º grau Mobitz I assintomático é relativa.",
 explain:"Contraindicações <b>relativas</b> = situações de alto risco que exigem cautela (ambiente hospitalar, protocolo adaptado, observação rigorosa, equipe para reprogramar MP/CDI) — não impedem o exame. O <b>BAV de risco</b> (Mobitz II, BAV 2:1, avançado/alto grau, BAVT — exceto congênito) é <b>absoluto</b>; Mobitz I não entra nessa lista.",
 thm:"Relativa = 'faço com cautela'. Mobitz I (relativa) vs Mobitz II / BAVT adquirido (absoluta) é discriminador clássico."},

{block:"Contraindicações & segurança",type:"mc",
 q:"Sobre IAM e TE, qual afirmativa está correta conforme a diretriz 2024?",
 options:[
   "IAM contraindica TE por 30 dias em qualquer caso",
   "IAM antes de 5 dias OU com complicações é contraindicação absoluta",
   "TE é liberado 24h após IAM não complicado",
   "Só IAM de parede anterior contraindica o TE"],
 correct:1,
 answer:"IAM antes de 5 dias ou com complicações é contraindicação absoluta.",
 explain:"Após esse período e sem complicações, o TE tem papel consolidado na estratificação pós-IAM (ex.: Escore de Duke aplicado ~1 mês pós-IAM no GISSI-2). Nos primeiros dias há remodelamento e instabilidade elétrica/mecânica.",
 thm:"O número é 5 dias (e 'sem complicações')."},

{block:"Contraindicações & segurança",type:"mc",
 q:"Preparo correto para cintilografia com DIPIRIDAMOL:",
 options:[
   "Suspender metilxantinas 12h e dipiridamol prévio 24h; jejum de 3h",
   "Nenhuma restrição é necessária",
   "Suspender cafeína por 2h apenas",
   "Manter betabloqueador e suspender só nitrato"],
 correct:0,
 answer:"Metilxantinas/cafeína ≥12h; dipiridamol prévio ≥24h; jejum de 3h.",
 explain:"Metilxantinas (café, chá, chocolate, energéticos, alguns analgésicos/antigripais) são <b>inibidores competitivos dos receptores de adenosina</b> e abolem o efeito vasodilatador. Adenosina suspende ≥12h; dipiridamol ≥24h; teofilina ≥12h. Tenha <b>aminofilina (1–2 mg/kg, até 240 mg)</b> como antídoto.",
 thm:"Cafeína/metilxantina = 12h. Dipiridamol = 24h. Aminofilina é o antídoto."},

{block:"Contraindicações & segurança",type:"mc",
 q:"Contraindicação ABSOLUTA específica ao estresse com VASODILATADOR (dipiridamol/adenosina):",
 options:[
   "Doença do nó sinusal",
   "Bradicardia sinusal acentuada",
   "Broncoespasmo em atividade / estado de mal asmático",
   "Doença carotídea grave bilateral"],
 correct:2,
 answer:"Broncoespasmo ativo / mal asmático / hiper-reatividade <3 meses (e BAV 2º-3º sem MP, PAS <90, AVC/AIT <2 meses).",
 explain:"O risco central do vasodilatador é o <b>brônquio</b>. As demais opções são <b>relativas</b>. Já a <b>dobutamina</b> tem absolutas de natureza adrenérgica: arritmias (FA/TV), EAo grave, CMH obstrutiva, PAS <90, HAS >200, angina instável/IAM recente, aneurisma/dissecção, presença de CDI, distúrbios do potássio.",
 thm:"Vasodilatador → medo do brônquio. Dobutamina → medo da arritmia/obstrução."},

{block:"Contraindicações & segurança",type:"mc",
 q:"Mulher de 62 anos com BRE de repouso precisa avaliar isquemia. Melhor estratégia?",
 options:[
   "TE em esteira com protocolo de Bruce",
   "Cintilografia com prova farmacológica vasodilatadora (dipiridamol/adenosina) — I-A",
   "Cintilografia com dobutamina como 1ª escolha",
   "Apenas ECG de repouso seriado"],
 correct:1,
 answer:"CPM com vasodilatador (dipiridamol ou adenosina) — GR I, NE A.",
 explain:"Em <b>BRE, WPW e marca-passo</b> o esforço gera alteração de ST não interpretável/falso-positiva (defeito septal artefatual dependente de FC no BRE). O vasodilatador é preferível à dobutamina justamente para evitar esse defeito septal FC-dependente.",
 thm:"BRE / WPW / MP = vasodilatador na CPM. Decore o trio."},

/* BLOCO 2 */
{block:"Critérios de interrupção",type:"mc",
 q:"Durante o TE, paciente NORMOTENSO atinge PAD de 122 mmHg, assintomático. Conduta?",
 options:[
   "Manter, pois só interrompe acima de 140",
   "Interromper — PAD ≥120 mmHg em normotenso é critério de interrupção",
   "Reduzir carga e prosseguir",
   "Interromper só se houver sintomas"],
 correct:1,
 answer:"Interromper: PAD ≥120 mmHg em normotenso é critério de parada.",
 explain:"Critérios pressóricos (Tabela 36): <b>PAS >250</b>; <b>PAD ≥120 em normotensos</b>; <b>PAD ≥140 em hipertensos</b>; queda da PAS ≥20 mmHg após elevação inicial; SpO₂ ≤92% (basal normal). Repare: limite de repouso para NÃO iniciar é 180/110; limite intraesforço para PARAR é maior.",
 thm:"Interrupção: PAS >250 · PAD ≥120 (normo) · PAD ≥140 (hiper). Queda PAS ≥20 = alarme."},

{block:"Critérios de interrupção",type:"mc",
 q:"Quais magnitudes de desnível de ST configuram critério de INTERRUPÇÃO do esforço?",
 options:[
   "Infra ≥1 mm horizontal",
   "Infra ≥3 mm adicional ao repouso; supra ≥2 mm em derivação sem infarto prévio",
   "Supra ≥1 mm em qualquer derivação",
   "Infra ≥2 mm ascendente lento"],
 correct:1,
 answer:"Infra ≥0,3 mV (3 mm) adicional; supra ≥0,2 mV (2 mm) em derivação sem infarto prévio.",
 explain:"Não confunda <b>positividade isquêmica</b> (infra horizontal/descendente ≥1 mm no ponto Y) com <b>interrupção</b> (infra ≥3 mm adicional; supra ≥2 mm sem onda Q/infarto). O supra em derivação sem infarto sugere isquemia transmural grave/espasmo → parada imediata.",
 thm:"Positividade = 1 mm. Interrupção = 3 mm infra (adicional) ou 2 mm supra (sem infarto)."},

{block:"Critérios de interrupção",type:"mc",
 q:"Qual achado arrítmico É critério de interrupção (mesmo em episódio único)?",
 options:[
   "Extrassístoles ventriculares isoladas frequentes",
   "TVNS monomórfica de 3 batimentos isolada",
   "TVNS polimórfica (um episódio)",
   "Extrassístoles supraventriculares isoladas"],
 correct:2,
 answer:"Um episódio de TVNS polimórfica.",
 explain:"Tabela 36 (interrupção): TVNS (≥3 bat/<30s) <b>ou um episódio de TVNS polimórfica</b>; TV sustentada; FV; FA/flutter esforço-induzidos; TSV sustentada; BAV 2º/3º esforço-induzido; BRE esforço-induzido sintomático; queda persistente da FC com incremento; em CDI, parar 10 bpm abaixo da FC de disparo. TVNS <b>monomórfica</b> isolada → individualizar. EVs/ESVs isoladas não são critério.",

const TOTAL = QUESTIONS.length;
const STORE = "ergo_quiz_2024_v2";  // v2: 60 questões + shuffle

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
// cria uma nova "rodada" embaralhada: ordem das questões + ordem das opções de cada questão
function freshState(){
  const order = shuffle([...Array(TOTAL).keys()]);   // ordem em que as questões aparecem
  const optOrder = QUESTIONS.map(Q => Q.type==="mc" ? shuffle([...Array(Q.options.length).keys()]) : null);
  return { idx:0, order, optOrder, answers:new Array(TOTAL).fill(null) };
}
let state = freshState();

function load(){
  try{
    const s=JSON.parse(localStorage.getItem(STORE));
    if(s && s.answers && s.answers.length===TOTAL && s.order && s.optOrder){ state=s; }
  }catch(e){}
}
function save(){ try{ localStorage.setItem(STORE, JSON.stringify(state)); }catch(e){} }
load();

// helpers de indireção: posição na sequência -> questão real
const qAt = pos => QUESTIONS[state.order[pos]];
const optOrderAt = pos => state.optOrder[state.order[pos]];

const prevBtn=document.getElementById("prevBtn");
const nextBtn=document.getElementById("nextBtn");
const quizArea=document.getElementById("quizArea");
const resultArea=document.getElementById("resultArea");
const pad=n=>String(n).padStart(2,"0");

/* ============ RENDER QUESTÃO ============ */
function render(){
  resultArea.innerHTML=""; quizArea.style.display="";
  const pos=state.idx, Q=qAt(pos), ans=state.answers[pos];
  const answered = ans!==null;

  pfill.style.width = ((pos)/TOTAL*100)+"%";
  pcount.textContent = pad(pos+1)+" / "+pad(TOTAL);

  let html = `<div class="card">
    <div class="qtop">
      <span class="qnum">Q${pad(pos+1)}</span>
      <span class="qtag">${Q.block}</span>
    </div>
    <p class="qtext">${Q.q}</p>`;

  if(Q.type==="mc"){
    const ord = optOrderAt(pos);   // ordem embaralhada das opções (índices reais)
    html += `<div class="opts">`;
    ord.forEach((realIdx,displayPos)=>{
      const letter=String.fromCharCode(65+displayPos);
      let cls="opt", mark="";
      if(answered){
        if(realIdx===Q.correct){cls+=" correct"; mark="✓";}
        else if(realIdx===ans.given){cls+=" wrong"; mark="✕";}
      }
      html+=`<button class="${cls}" data-oi="${realIdx}" ${answered?"disabled":""}>
        <span class="key">${letter}</span><span>${Q.options[realIdx]}</span>${mark?`<span class="mark">${mark}</span>`:""}</button>`;
    });
    html+=`</div>`;
  } else {
    // open / self-assess
    if(!answered){
      html += `<button class="reveal-btn" id="revealBtn">Mostrar resposta</button>`;
    }
  }

  // feedback
  if(answered || (Q.type==="open" && ans!==null)){
    html += feedbackHTML(Q, ans);
  }

  html += `</div>`;
  slot.innerHTML=html;

  // bind
  if(Q.type==="mc" && !answered){
    slot.querySelectorAll(".opt").forEach(b=>{
      b.addEventListener("click",()=>choose(parseInt(b.dataset.oi)));
    });
  }
  if(Q.type==="open" && !answered){
    const rb=document.getElementById("revealBtn");
    if(rb) rb.addEventListener("click",revealOpen);
  }

  // nav state
  prevBtn.disabled = pos===0;
  prevBtn.style.visibility = pos===0 ? "hidden":"visible";
  const isLast = pos===TOTAL-1;
  nextBtn.textContent = isLast ? "Ver resultado →" : "Próxima →";
  nextBtn.disabled = !answered;
  save();
}

function feedbackHTML(Q, ans){
  let v="";
  if(Q.type==="mc"){
    const ok=ans.correct;
    v=`<div class="verdict ${ok?'ok':'no'}"><span class="dot"></span>${ok?'Correto':'Incorreto'}</div>`;
  } else {
    if(ans.correct===true) v=`<div class="verdict ok"><span class="dot"></span>Você marcou: acertei</div>`;
    else if(ans.correct===false) v=`<div class="verdict no"><span class="dot"></span>Você marcou: errei</div>`;
    else v=`<div class="verdict ok"><span class="dot"></span>Resposta revelada</div>`;
  }
  return `<div class="fb">
    ${v}
    <div class="ans"><b>Resposta.</b> ${Q.answer}</div>
    <p class="block-label">Comentário</p>
    <p class="explain">${Q.explain}</p>
    <div class="thm"><span class="ico">🎯</span><div class="body"><strong>Take home</strong>${Q.thm}</div></div>
    ${Q.type==="open" && ans.correct===null ? selfAssessHTML() : ""}
  </div>`;
}

function selfAssessHTML(){
  return `<div class="selfrow">
    <button class="self-hit" id="selfHit">Acertei ✓</button>
    <button class="self-miss" id="selfMiss">Errei ✕</button>
  </div>`;
}

function choose(realIdx){
  const pos=state.idx, Q=qAt(pos);
  state.answers[pos]={given:realIdx, correct: realIdx===Q.correct};
  save(); render();
}

function revealOpen(){
  const pos=state.idx;
  state.answers[pos]={given:null, correct:null}; // revelada, aguardando auto-avaliação
  save(); render();
  // bind self-assess buttons
  const h=document.getElementById("selfHit"), m=document.getElementById("selfMiss");
  if(h) h.addEventListener("click",()=>{state.answers[pos].correct=true; save(); render();});
  if(m) m.addEventListener("click",()=>{state.answers[pos].correct=false; save(); render();});
}

/* ============ NAV ============ */
nextBtn.addEventListener("click",()=>{
  if(state.idx===TOTAL-1){ showResult(); }
  else { state.idx++; render(); window.scrollTo({top:0,behavior:'smooth'}); }
});
prevBtn.addEventListener("click",()=>{
  if(state.idx>0){ state.idx--; render(); window.scrollTo({top:0,behavior:'smooth'}); }
});

/* ============ RESULTADO ============ */
function showResult(){
  quizArea.style.display="none";
  pfill.style.width="100%";
  const scored = state.answers.filter(a=>a&&a.correct!==null);
  const hits = state.answers.filter(a=>a&&a.correct===true).length;
  const total = scored.length || TOTAL;
  const pct = Math.round(hits/ (scored.length||1) *100);
  const missed = [];
  state.answers.forEach((a,i)=>{ if(a&&a.correct===false) missed.push(i); });

  let msg, color;
  if(pct>=85){msg="Pronta pra encarar o chefe. Mandou bem demais."; color="var(--good)";}
  else if(pct>=70){msg="Bom nível — revise os erros e fecha o ciclo."; color="var(--gold)";}
  else if(pct>=50){msg="Caminho certo. Foque nos blocos que mais escaparam."; color="var(--gold)";}
  else {msg="Hora de revisar a diretriz com calma e refazer."; color="var(--pulse)";}

  // ring
  const r=52, c=2*Math.PI*r, off=c*(1-pct/100);
  const ring=`<svg class="score-ring" width="140" height="140" viewBox="0 0 140 140">
    <circle cx="70" cy="70" r="${r}" fill="none" stroke="#e7e1d5" stroke-width="12"/>
    <circle cx="70" cy="70" r="${r}" fill="none" stroke="${color}" stroke-width="12"
      stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c}"
      transform="rotate(-90 70 70)" style="transition:stroke-dashoffset 1.1s cubic-bezier(.3,.8,.3,1)" id="ringFill"/>
    <text x="70" y="78" text-anchor="middle" font-size="30" font-weight="700"
      font-family="ui-monospace,monospace" fill="${color}">${pct}%</text>
  </svg>`;

  // ----- diagnóstico por bloco/assunto -----
  const blocks={};
  state.answers.forEach((a,pos)=>{
    if(!a || a.correct===null) return;          // só pontuadas
    const b=qAt(pos).block;
    if(!blocks[b]) blocks[b]={hit:0,tot:0};
    blocks[b].tot++; if(a.correct===true) blocks[b].hit++;
  });
  const blockRows=Object.keys(blocks).map(b=>{
    const o=blocks[b]; const p=Math.round(o.hit/o.tot*100);
    let lvl,lc;
    if(p>=80){lvl="Dominado";lc="var(--good)";}
    else if(p>=50){lvl="Revisar";lc="var(--gold)";}
    else {lvl="Estudar";lc="var(--pulse)";}
    return {b,p,lvl,lc,hit:o.hit,tot:o.tot};
  }).sort((a,z)=>a.p-z.p); // pior primeiro

  const toStudy=blockRows.filter(r=>r.p<80);

  let diagHTML="";
  if(blockRows.length){
    diagHTML=`<div class="diag">
      <p class="block-label" style="margin-bottom:12px">Desempenho por assunto</p>
      ${blockRows.map(r=>`
        <div class="diag-row">
          <div class="diag-head">
            <span class="diag-name">${r.b}</span>
            <span class="diag-tag" style="color:${r.lc};border-color:${r.lc}">${r.lvl}</span>
          </div>
          <div class="diag-bar"><div class="diag-fill" style="width:0" data-w="${r.p}" data-c="${r.lc}"></div></div>
          <span class="diag-frac mono">${r.hit}/${r.tot} · ${r.p}%</span>
        </div>`).join("")}
    </div>`;
  }

  let focusHTML="";
  if(toStudy.length){
    focusHTML=`<div class="focus">
      <div class="focus-head"><span>📌</span> Prioridade de estudo</div>
      <p class="focus-sub">Com base nos seus erros, foque nestes assuntos da diretriz, do mais urgente ao menos:</p>
      <ol class="focus-list">
        ${toStudy.map(r=>`<li><span class="fl-name">${r.b}</span> <span class="fl-meta mono" style="color:${r.lc}">${r.p}%</span></li>`).join("")}
      </ol>
    </div>`;
  } else if(blockRows.length){
    focusHTML=`<div class="focus all-good">
      <div class="focus-head"><span>✅</span> Sem pontos fracos evidentes</div>
      <p class="focus-sub">Você ficou ≥80% em todos os assuntos avaliados. Mantém a revisão dos números-chave e segue firme.</p>
    </div>`;
  }

  let missedHTML="";
  if(missed.length){
    missedHTML=`<div class="missed-list" id="missedList">
      <h3>Questões erradas (${missed.length})</h3>
      ${missed.map(pos=>`<div class="missed-item" data-i="${pos}">
        <span class="mn">Q${pad(pos+1)}</span><span>${qAt(pos).q.slice(0,90)}${qAt(pos).q.length>90?'…':''}</span></div>`).join("")}
    </div>`;
  }

  resultArea.innerHTML=`<div class="card result">
    ${ring}
    <h2>Resultado</h2>
    <p class="sub">${hits} de ${scored.length||TOTAL} corretas${scored.length<TOTAL?` · (${TOTAL-scored.length} não pontuadas)`:""}</p>
    <p class="verdict-msg" style="color:${color}">${msg}</p>
    <div class="result-stats">
      <div class="stat hit"><span class="n">${hits}</span><span class="l">Acertos</span></div>
      <div class="stat miss"><span class="n">${missed.length}</span><span class="l">Erros</span></div>
      <div class="stat"><span class="n">${pct}%</span><span class="l">Aproveitamento</span></div>
    </div>
    ${focusHTML}
    ${diagHTML}
    <div class="actions">
      ${missed.length?`<button class="review" id="reviewBtn">Revisar questões erradas</button>`:""}
      <button class="again" id="againBtn">Refazer simulado</button>
    </div>
    ${missedHTML}
  </div>`;

  // anima as barras do diagnóstico
  requestAnimationFrame(()=>{
    resultArea.querySelectorAll(".diag-fill").forEach((el,k)=>{
      setTimeout(()=>{ el.style.width=el.dataset.w+"%"; el.style.background=el.dataset.c; }, 120+k*70);
    });
  });

  requestAnimationFrame(()=>{ const rf=document.getElementById("ringFill"); if(rf) rf.style.strokeDashoffset=off; });
  window.scrollTo({top:0,behavior:'smooth'});

  const ag=document.getElementById("againBtn");
  if(ag) ag.addEventListener("click",resetAll);
  const rv=document.getElementById("reviewBtn");
  if(rv) rv.addEventListener("click",()=>{ document.getElementById("missedList").classList.toggle("show"); });
  resultArea.querySelectorAll(".missed-item").forEach(it=>{
    it.addEventListener("click",()=>{ state.idx=parseInt(it.dataset.i); render(); window.scrollTo({top:0,behavior:'smooth'}); });
  });
  save();
}

function resetAll(){
  state=freshState();   // nova rodada: reembaralha questões e opções
  save(); render(); window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById("resetBtn").addEventListener("click",()=>{
  if(confirm("Recomeçar do zero? Seu progresso atual será apagado.")) resetAll();
});

/* ============ START ============ */
render();
</script>
</body>
</html>
